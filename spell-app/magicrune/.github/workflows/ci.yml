name: magicrune-ci
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: spell-app/magicrune
          
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          
      - name: Run tests
        run: |
          cd spell-app/magicrune
          cargo test --workspace --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          
      - name: Build release
        run: |
          cd spell-app/magicrune
          cargo build --release --workspace --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          
      - name: Install syft
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v0.102.0
          
      - name: Generate SBOM
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          cd spell-app/magicrune
          syft dir:. -o spdx-json > sbom.json
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magicrune-${{ matrix.target }}
          path: |
            spell-app/magicrune/target/${{ matrix.target }}/release/magicrune
            spell-app/magicrune/sbom.json
          if-no-files-found: error
          
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          
      - name: Check formatting
        run: |
          cd spell-app/magicrune
          cargo fmt --all -- --check
          
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: spell-app/magicrune
          
      - name: Run clippy
        run: |
          cd spell-app/magicrune
          cargo clippy --all-targets --all-features -- -D warnings