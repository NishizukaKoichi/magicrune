name: ai-safety
on:
  pull_request:
    types: [opened, synchronize]
    
jobs:
  sandbox:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install MagicRune
        run: |
          curl -sSL https://magicrune.sh/install | bash
          echo "$HOME/.magicrune/bin" >> $GITHUB_PATH
          
      - name: Initialize MagicRune
        run: magicrune init --force
        
      - name: Enforce sandbox for external sources
        id: scan
        run: |
          magicrune ci-scan \
            --paths "scripts/**,tools/**,src/**/*.sh,*.sh" \
            --enforce-external
        continue-on-error: true
        
      - name: Generate report
        if: always()
        run: |
          magicrune ci-report \
            --pr ${{ github.event.pull_request.number }} \
            --output magicrune-report.json
            
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('magicrune-report.json', 'utf8'));
            
            let emoji = '✅';
            let status = 'Green';
            
            if (report.verdict === 'Yellow') {
              emoji = '⚠️';
              status = 'Yellow - Review Required';
            } else if (report.verdict === 'Red') {
              emoji = '❌';
              status = 'Red - Security Risk Detected';
            }
            
            const comment = `## ${emoji} MagicRune Security Scan
            
            **Status:** ${status}
            **Risk Score:** ${report.risk_score || 0}
            
            ### Detected Behaviors
            ${report.behaviors.map(b => `- **${b.category}**: ${b.description}`).join('\n')}
            
            ### Recommendations
            ${report.recommendations.map(r => `- ${r}`).join('\n')}
            
            ---
            *Generated by [MagicRune Policy Runner](https://github.com/magicrune/magicrune)*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
            
      - name: Fail if Red verdict
        if: steps.scan.outcome == 'failure'
        run: |
          echo "❌ Security scan failed - dangerous code detected"
          exit 1