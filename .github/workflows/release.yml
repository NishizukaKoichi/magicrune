name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} --bin magicrune
          else
            cargo build --release --target ${{ matrix.target }} --bin magicrune
          fi

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf magicrune-${{ matrix.target }}.tar.gz magicrune
          mv magicrune-${{ matrix.target }}.tar.gz ../../../

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a magicrune-${{ matrix.target }}.zip magicrune.exe
          mv magicrune-${{ matrix.target }}.zip ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magicrune-${{ matrix.target }}
          path: magicrune-${{ matrix.target }}.*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: |
          find dist/ -type f -name "magicrune-*" -exec ls -la {} \;

      - name: Generate checksums
        run: |
          cd dist
          for dir in */; do
            cd "$dir"
            for file in magicrune-*; do
              if [[ -f "$file" ]]; then
                sha256sum "$file" >> "../checksums.txt"
                mv "$file" "../"
              fi
            done
            cd ..
          done
          ls -la

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: MagicRune ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/magicrune-*
            dist/checksums.txt
          body: |
            ## What's Changed
            
            * Cross-platform support for Linux, macOS (Intel & Apple Silicon), and Windows
            * Secure sandbox execution for external code
            * Multi-layer defense with namespaces, chroot, and seccomp
            * Behavior analysis and risk scoring
            * Signature verification system
            * Audit logging and CI/CD integration
            
            ## Installation
            
            ### Quick Install (Linux/macOS)
            ```bash
            curl -sSL https://raw.githubusercontent.com/magicrune/magicrune/main/install.sh | bash
            ```
            
            ### Manual Download
            Download the appropriate binary for your platform from the assets below.
            
            ### Homebrew (macOS)
            ```bash
            brew tap magicrune/tap
            brew install magicrune
            ```
            
            ### Verify Installation
            ```bash
            magicrune --version
            ```
            
            ## Platform Support
            
            | Platform | Architecture | Support |
            |----------|-------------|---------|
            | Linux | x86_64 | ✅ |
            | Linux | ARM64 | ✅ |
            | macOS | Intel | ✅ |
            | macOS | Apple Silicon | ✅ |
            | Windows | x86_64 | ✅ |
            
            ## Checksums
            
            Verify your download with SHA256 checksums available in `checksums.txt`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Calculate checksums
        id: checksums
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Download and calculate checksums for macOS binaries
          curl -sL "https://github.com/magicrune/magicrune/releases/download/v${VERSION}/magicrune-x86_64-apple-darwin.tar.gz" -o intel.tar.gz
          curl -sL "https://github.com/magicrune/magicrune/releases/download/v${VERSION}/magicrune-aarch64-apple-darwin.tar.gz" -o arm.tar.gz
          
          INTEL_SHA=$(sha256sum intel.tar.gz | cut -d' ' -f1)
          ARM_SHA=$(sha256sum arm.tar.gz | cut -d' ' -f1)
          
          echo "intel_sha=${INTEL_SHA}" >> $GITHUB_OUTPUT
          echo "arm_sha=${ARM_SHA}" >> $GITHUB_OUTPUT

      - name: Update Homebrew Formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          INTEL_SHA=${{ steps.checksums.outputs.intel_sha }}
          ARM_SHA=${{ steps.checksums.outputs.arm_sha }}
          
          cat > homebrew-formula.rb << EOF
          class Magicrune < Formula
            desc "Secure code execution framework with automatic sandbox detection"
            homepage "https://github.com/magicrune/magicrune"
            version "${VERSION}"
            license "MIT"

            if Hardware::CPU.intel?
              url "https://github.com/magicrune/magicrune/releases/download/v${VERSION}/magicrune-x86_64-apple-darwin.tar.gz"
              sha256 "${INTEL_SHA}"
            elsif Hardware::CPU.arm?
              url "https://github.com/magicrune/magicrune/releases/download/v${VERSION}/magicrune-aarch64-apple-darwin.tar.gz"
              sha256 "${ARM_SHA}"
            end

            def install
              bin.install "magicrune"
              
              # Create default directories
              (var/"magicrune/trusted_keys").mkpath
              (var/"magicrune/audit").mkpath
              (var/"magicrune/cache").mkpath
            end

            test do
              system "#{bin}/magicrune", "--version"
              system "#{bin}/magicrune", "--help"
            end
          end
          EOF

      - name: Commit updated formula
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add homebrew-formula.rb
          git commit -m "Update Homebrew formula to v${{ steps.version.outputs.version }}" || exit 0
          git push