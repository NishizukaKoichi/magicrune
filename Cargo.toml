[package]
name = "magicrune"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"

[dependencies]
tokio = { version = "1.47", features = ["full"] }
tokio-stream = "0.1"
async-nats = "0.37"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
clap = { version = "4.5", features = ["derive"] }
sha2 = "0.10"
hex = "0.4"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
jsonschema = "0.26"
wasmtime = "15.0"
wasmtime-wasi = "15.0"
rusqlite = { version = "0.33", features = ["bundled"] }
base64 = "0.22"
tempfile = "3.14"
nix = { version = "0.29", features = ["process", "sched", "mount"] }
libc = "0.2"
once_cell = "1.20"
regex = "1.11"
uuid = { version = "1.11", features = ["v4", "serde"] }
async-trait = "0.1"

[dev-dependencies]
tempdir = "0.3"
mockall = "0.13"
async-trait = "0.1"

[profile.release]
opt-level = 3
lto = true
strip = true
